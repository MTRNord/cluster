name: Build Continuwuity Wrapper Image

on:
  push:
    branches: ["main"]
    paths:
      - "apps/talos_cluster/continuwuity/Dockerfile"
      - ".github/workflows/build-continuwuity.yaml"
  schedule:
    # Rebuild daily at 03:00 UTC to pick up upstream :main changes
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    #if: false  # disabled — replaced by in-cluster image-builder cronjob
    name: Build and Push
    runs-on: ubuntu-latest
    environment: registry
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to self-hosted registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: registry.midnightthoughts.space
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: registry.midnightthoughts.space/mtrnord/cluster/continuwuity
          labels: |
            org.opencontainers.image.description=Continuwuity (Conduit fork) Matrix homeserver — multi-arch wrapper image
            org.opencontainers.image.title=continuwuity
            org.opencontainers.image.vendor=MTRNord
          tags: |
            type=raw,value=main
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}
            type=sha,prefix=sha-

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: apps/talos_cluster/continuwuity
          file: apps/talos_cluster/continuwuity/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_OCI_EXPERIMENTAL: "1"
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            --new-bundle-format=false \
            --use-signing-config=false \
            --registry-referrers-mode=oci-1-1 \
            "registry.midnightthoughts.space/mtrnord/cluster/continuwuity@${DIGEST}"
