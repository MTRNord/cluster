name: Build Bookwyrm Image

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-bookwyrm.yaml"
      - "apps/talos_cluster/bookwyrm/dockerfile.patch"
  schedule:
    # Check for new upstream releases daily at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Bookwyrm version to build (e.g. v0.8.3). Leave empty to use latest upstream release."
        required: false
      force:
        description: "Force rebuild even if tag already exists in registry"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  check:
    if: false  # disabled — replaced by in-cluster image-builder cronjob
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versions.outputs.new_version }}
      needs_build: ${{ steps.versions.outputs.needs_build }}
    steps:
      - name: Determine versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            NEW="$INPUT_VERSION"
          else
            NEW=$(gh api repos/bookwyrm-social/bookwyrm/releases/latest --jq '.tag_name')
          fi
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

          if [ "$INPUT_FORCE" = "true" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested for tag ${NEW}"
          else
            # Check if this tag already exists in the registry (anonymous read)
            TAGS=$(curl -sf "https://registry.midnightthoughts.space/v2/mtrnord/bookwyrm/tags/list" \
              | grep -o '"tags":\[[^]]*\]' || echo "")
            if echo "$TAGS" | grep -q "\"${NEW}\""; then
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${NEW} already exists in registry, skipping build"
            else
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
              echo "Tag ${NEW} not found in registry, will build"
            fi
          fi

  build:
    name: Build, Push and Sign
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    environment: registry
    steps:
      - name: Checkout bookwyrm source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: bookwyrm-social/bookwyrm
          ref: ${{ needs.check.outputs.new_version }}
          persist-credentials: false

      - name: Checkout gitops for Dockerfile patch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: _gitops
          persist-credentials: false

      - name: Apply Dockerfile patch (if applicable)
        run: |
          if git apply --check _gitops/apps/talos_cluster/bookwyrm/dockerfile.patch 2>/dev/null; then
            git apply _gitops/apps/talos_cluster/bookwyrm/dockerfile.patch
            echo "Patch applied successfully"
          else
            echo "Patch does not apply cleanly — upstream Dockerfile likely already includes the needed changes, proceeding as-is"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to self-hosted registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: registry.midnightthoughts.space
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          tags: |
            registry.midnightthoughts.space/mtrnord/bookwyrm:${{ needs.check.outputs.new_version }}
            registry.midnightthoughts.space/mtrnord/bookwyrm:latest
          labels: |
            org.opencontainers.image.description=BookWyrm social reading and review platform
            org.opencontainers.image.title=bookwyrm
            org.opencontainers.image.vendor=MTRNord
            org.opencontainers.image.version=${{ needs.check.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_OCI_EXPERIMENTAL: "1"
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            --new-bundle-format=false \
            --use-signing-config=false \
            --registry-referrers-mode=oci-1-1 \
            "registry.midnightthoughts.space/mtrnord/bookwyrm@${DIGEST}"
