apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: "12.0.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Kopia node agent DaemonSet — required for file-system backup of hcloud-volumes
    # (hcloud CSI driver does not support VolumeSnapshots)
    deployNodeAgent: true

    nodeAgent:
      tolerations:
        # Allow node-agent to run on control plane nodes so that DaemonSet pods
        # scheduled there (Cilium, hcloud-csi-controller) can have their volumes backed up.
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: prometheus-stack

    configuration:
      # EnableCSI: built-in since v1.14, enables CSI snapshots for Longhorn volumes
      features: EnableCSI
      # Raise API client limits — default 20 QPS / 30 burst causes context deadline exceeded
      # when listing node-agent pods across many pods concurrently during backup.
      clientQPS: 100
      clientBurst: 200
      # Use Kopia file-system backup for all volumes by default.
      # CSI snapshots (for Longhorn) run additionally when a VolumeSnapshotClass
      # labelled velero.io/csi-volumesnapshot-class=true exists.
      defaultVolumesToFsBackup: true
      # Increase timeout to avoid "exposed PVB is not ready" errors on slow volumes
      podVolumeOperationTimeout: 60m
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: mtrnord-talos-velero
          config:
            s3Url: https://hel1.your-objectstorage.com
            region: hel1
            s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: hel1
      # Kopia repository maintenance job configuration.
      # Without resource limits, 30+ concurrent maintenance jobs fill the node's
      # ephemeral storage, causing DiskPressure → Velero pod eviction → backup failure.
      repositoryMaintenanceJob:
        repositoryConfigData:
          global:
            keepLatestMaintenanceJobs: 3
            podResources:
              cpuRequest: "100m"
              cpuLimit: "500m"
              memoryRequest: "128Mi"
              memoryLimit: "1Gi"
              # Limit ephemeral storage to prevent DiskPressure on nodes
              # (30+ concurrent maintenance jobs can fill node's local storage)
              ephemeralStorageRequest: "200Mi"
              ephemeralStorageLimit: "2Gi"

    credentials:
      useSecret: true
      existingSecret: velero-s3-credentials

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
