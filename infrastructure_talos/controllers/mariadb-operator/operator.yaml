apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
  namespace: mariadb-operator
spec:
  releaseName: mariadb-operator
  chart:
    spec:
      chart: mariadb-operator
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
  interval: 60m
  timeout: 5m
  install:
    timeout: 5m
    remediation:
      retries: 3
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    crds:
      enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
