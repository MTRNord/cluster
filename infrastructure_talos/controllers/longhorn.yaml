apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: longhorn
    namespace: longhorn-system
spec:
    releaseName: longhorn
    targetNamespace: longhorn-system
    interval: 30m
    install:
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    chart:
        spec:
            chart: longhorn
            version: 1.11.0
            sourceRef:
                kind: HelmRepository
                name: longhorn
                namespace: longhorn-system
            interval: 24h
    values:
        defaultSettings:
            allowCollectingLonghornUsageMetrics: false
            kubernetesClusterAutoscalerEnabled: false
            upgradeChecker: false
        networkPolicies:
            enabled: true
            type: rke1
        persistence:
            defaultClass: true
        preUpgradeChecker:
            upgradeVersionCheck: false
