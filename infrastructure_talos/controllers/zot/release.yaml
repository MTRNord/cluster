apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  interval: 30m
  chart:
    spec:
      chart: zot
      version: "0.1.x"
      sourceRef:
        kind: HelmRepository
        name: zot
        namespace: zot
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    image:
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 5000

    priorityClassName: system-cluster-critical

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: "1"
        memory: 512Mi

    # Mount zot-secret at /etc/zot — provides config.json (with real S3 creds) and htpasswd
    externalSecrets:
      - secretName: zot-secret
        mountPath: /etc/zot

    # Mount cosign public key into _cosign directory so it persists across pod restarts
    extraVolumes:
      - name: cosign-pubkey
        configMap:
          name: zot-cosign-pubkey

    extraVolumeMounts:
      - name: cosign-pubkey
        mountPath: /var/lib/registry/_cosign/cosign.pub
        subPath: cosign.pub
