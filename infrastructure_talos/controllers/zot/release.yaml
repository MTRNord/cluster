apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  interval: 30m
  chart:
    spec:
      chart: zot
      version: "0.1.x"
      sourceRef:
        kind: HelmRepository
        name: zot
        namespace: zot
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    image:
      # Multi-arch image supports arm64 natively
      repository: ghcr.io/project-zot/zot-linux-arm64
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 5000

    priorityClassName: system-cluster-critical

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: "1"
        memory: 512Mi

    # Zot config — S3_ACCESS_KEY and S3_SECRET_KEY are substituted from env vars at startup
    configFiles:
      config.json: |
        {
          "distSpecVersion": "1.1.0",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "storageDriver": {
              "name": "s3",
              "region": "hel1",
              "regionEndpoint": "https://hel1.your-objectstorage.com",
              "bucket": "midnightthoughts-registry",
              "forcepathstyle": true,
              "secure": true,
              "accesskey": "$S3_ACCESS_KEY",
              "secretkey": "$S3_SECRET_KEY"
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "auth": {
              "htpasswd": {
                "path": "/htpasswd/htpasswd"
              }
            }
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "search": {
              "enable": true
            },
            "trust": {
              "enable": true,
              "cosign": true
            },
            "ui": {
              "enable": true
            },
            "metrics": {
              "enable": true,
              "prometheus": {
                "path": "/metrics"
              }
            }
          },
          "accessControl": {
            "anonymousPolicy": ["read"],
            "adminPolicy": {
              "users": ["admin"],
              "actions": ["read", "create", "update", "delete"]
            }
          }
        }

    # Inject S3 credentials as env vars for config substitution
    extraEnvFrom:
      - secretRef:
          name: zot-secret

    # Mount htpasswd from Secret
    extraVolumes:
      - name: htpasswd
        secret:
          secretName: zot-secret
          items:
            - key: htpasswd
              path: htpasswd

    extraVolumeMounts:
      - name: htpasswd
        mountPath: /htpasswd
        readOnly: true
