apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: monitoring
spec:
    interval: 5m
    chart:
        spec:
            version: 82.x
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
            interval: 60m
    install:
        crds: CreateReplace
    upgrade:
        crds: CreateReplace
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    values:
        defaultRules:
            disabled:
                NodeMemoryMajorPagesFaults: true
        kubeProxy:
            enabled: false
        alertmanager:
            alertmanagerSpec:
                externalUrl: https://alertmanager.midnightthoughts.space
            config:
                global:
                    resolve_timeout: 5m
                    smtp_smarthost: smtp.fastmail.com:587
                    smtp_from: ops@nordgedanken.dev
                    smtp_auth_username: ENC[AES256_GCM,data:Z5LWLrdB0O3GuE+9KQ+PAim41veCw2ES,iv:WkwDGwWj2587aLjlwymZMilnB9RqoY0oiiBBZ4Lhh0Q=,tag:hk7K1qgdmP/j8C8lXXcnvg==,type:str]
                    smtp_auth_password: ENC[AES256_GCM,data:02+CFavijb9rjNjKAwlSsQ==,iv:6oMt99sXo1nsR+0CpgRqdvJ167FTwMjMJyvQRfm5sTw=,tag:wmWeAGIu+l0vV3Gdb1tLZQ==,type:str]
                    smtp_require_tls: true
                route:
                    receiver: email
                    group_by:
                        - alertname
                        - namespace
                    group_wait: 30s
                    group_interval: 5m
                    repeat_interval: 4h
                    routes:
                        - receiver: "null"
                          matchers:
                            - alertname = "Watchdog"
                        - receiver: "null"
                          matchers:
                            - alertname = "InfoInhibitor"
                        - receiver: "null"
                          matchers:
                            - severity = "info"
                        - receiver: "null"
                          matchers:
                            - alertname = "NodeMemoryHighUtilization"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-plausible-clickhouse-shard0-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-thanos-compact-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "storage-loki-0"
                        - receiver: email
                          matchers:
                            - severity = "critical"
                receivers:
                    - name: "null"
                    - name: email
                      email_configs:
                        - to: mtrnord@nordgedanken.dev
                          send_resolved: true
                inhibit_rules:
                    - source_matchers:
                        - severity = "critical"
                      target_matchers:
                        - severity = "warning"
                      equal:
                        - namespace
                        - alertname
        prometheus:
            prometheusSpec:
                retention: 4h
                enableRemoteWriteReceiver: true
                externalUrl: https://prometheus.midnightthoughts.space
                externalLabels:
                    k8s_cluster: midnightthoughts
                # Pick up all ServiceMonitors/PodMonitors/etc. regardless of labels
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                ruleNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                # Thanos sidecar uploads completed TSDB blocks to Hetzner S3.
                # First block is cut after ~3h (Prometheus head span must exceed chunkRange × 1.5 = 3h).
                # Subsequent blocks are cut every 2h once the head is warm.
                thanos:
                    objectStorageConfig:
                        existingSecret:
                            name: thanos-objstore-secret
                            key: ENC[AES256_GCM,data:GEWtKmnn,iv:N5qFNjzi1PqmC4JJYfMPN2VsAyezukLHVk8R2S2y8qY=,tag:C2dqJyVECpWy7nGLcJkurA==,type:str]
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn-2replicas
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 10Gi
        grafana:
            adminPassword: ENC[AES256_GCM,data:B+t9wnxmvNWEWlxHROGU/vj++xP8UP5Gz825pKRWUIag3bTyHtM97RmJLNUNy79ESLyRfZ8vB1LJMp+Xx07gyA==,iv:wvjgKGpvrHHJ4JPNL46AHrHl920q8xuOPHdG/NU9IsI=,tag:SziF6UhoL38xPYqONPf6XA==,type:str]
            sidecar:
                datasources:
                    # Disable the auto-generated default Prometheus datasource so it
                    # doesn't conflict with our custom datasources.yaml (which points to Thanos)
                    defaultDatasourceEnabled: false
                dashboards:
                    folderAnnotation: grafana_folder
                    provider:
                        foldersFromFilesStructure: true
                    logLevel: WARN
                    watchServerTimeout: 3600
                    enabled: true
            plugins:
                - grafana-piechart-panel
                - grafana-worldmap-panel
                - isovalent-hubble-datasource
                - isovalent-hubbleprocessancestry-panel
                - chaosmeshorg-datasource
            smtp:
                existingSecret: smtp-auth-secret
            extraSecretMounts:
                - name: auth-generic-oauth-secret-mount
                  secretName: auth-generic-oauth-secret
                  defaultMode: 288
                  mountPath: /etc/secrets/auth_generic_oauth
                  readOnly: true
            defaultDashboardsTimezone: Europe/Berlin
            datasources:
                datasources.yaml:
                    apiVersion: 1
                    datasources:
                        - name: Prometheus
                          type: prometheus
                          uid: prometheus
                          url: http://thanos-query-frontend.monitoring.svc.cluster.local:10902
                          access: proxy
                        - name: ChaosMesh
                          type: chaosmeshorg-datasource
                          url: http://chaos-dashboard.chaosmesh.svc.cluster.local:2333
                          access: proxy
                          isDefault: false
                        - name: Hubble
                          type: isovalent-hubble-datasource
                          uid: hubble
                          access: proxy
                          url: http://hubble-relay.kube-system.svc.cluster.local:80
                          isDefault: false
                          jsonData:
                            serviceMap:
                                datasourceUid: prometheus
                            prometheusDatasourceUid: prometheus
                        - name: Postgres-d4all
                          type: postgres
                          uid: postgres-d4all
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: draupnir_synapse
                          user: grafana-ro
                          secureJsonData:
                            password: ENC[AES256_GCM,data:s4/wgtItvv9hX64MU//4gokgvjHQpTHeHQ8PMY8DM9pyP4eqzH/XguwfVEJe/yXYgQKIXVGIF7A8uzGyUbDiBQ==,iv:nXDzG9sTcI+IMHsxXnHA5dCSkTfLwJ625uOUTsBePSA=,tag:hMOr3hk/xUlbs9TUI07npQ==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
                        - name: Loki
                          type: loki
                          uid: loki
                          url: http://loki.loki.svc.cluster.local:3100
                          access: proxy
                          isDefault: false
                          jsonData:
                            maxLines: 1000
                        - name: Postgres-connectivity-tester
                          type: postgres
                          uid: postgres-connectivity-tester
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: connectivity-tester
                          user: connectivity-tester
                          secureJsonData:
                            password: ENC[AES256_GCM,data:epwM0/QtgJfTmRCtXYA9riBj1wf2LCaZVGeyT8rcTUN0Q3EUg83RBli7+pm//tLszYg2AwivAT40NUCFb/NMQA==,iv:yOusHEl+dOFhH2MlVIKJ70orTkIG7esTpkksPZ5c3T0=,tag:LQk6izNz5RWMOfLBfywZXw==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
            ingress:
                enabled: false
            grafana.ini:
                server:
                    root_url: https://grafana.midnightthoughts.space
                smtp:
                    enabled: true
                    host: smtp.fastmail.com:465
                    from_address: ops@nordgedanken.dev
                paths:
                    data: ENC[AES256_GCM,data:1+toTwruaOuD2YVLi4JCX90=,iv:7OR1ElU0GIV8hihDytclZDZIeT/KokHnceJWWHmnaJY=,tag:KjtaS6NmBzzFx/GQF4xTpA==,type:str]
                    logs: /var/log/grafana
                    plugins: /var/lib/grafana/plugins
                    provisioning: /etc/grafana/provisioning
                analytics:
                    check_for_updates: true
                log:
                    mode: console
                grafana_net:
                    url: https://grafana.net
                auth:
                    signout_redirect_url: https://auth.midnightthoughts.space/application/o/grafana/end-session/
                    oauth_auto_login: true
