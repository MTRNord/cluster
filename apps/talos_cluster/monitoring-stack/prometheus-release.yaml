                    client_id: ENC[AES256_GCM,data:TY2ixgfZI+aYrlxL51vVnCnlRixLMZd+/u2sBM3UcRWcdHtJ5XxRDhsyoW/GiYTT5Nk=,iv:4DAHEwPgo67yM3N0hF+0kbB4kbik/BDSx898ip7UYqs=,tag:054TcwOq3FhRvSveoImJ1A==,type:str]
                    client_secret: ENC[AES256_GCM,data:RFqLq+7s2jZiStKiAcBH3Tw5/iEf+EjcDK10KKNuUUwQEssTBTDAWPpMNvksYtpSMnOX596c,iv:pyOvpTdgKKoRx1eD7r3Od7aKLIptsNnzu6b/oXgm2Gk=,tag:ODFuwRQBnVZE9Ux5KEgrPw==,type:str]
