apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: monitoring
spec:
    interval: 5m
    chart:
        spec:
            version: 82.x
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
            interval: 60m
    install:
        crds: CreateReplace
    upgrade:
        crds: CreateReplace
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    values:
        kubeProxy:
            enabled: false
        alertmanager:
            alertmanagerSpec:
                externalUrl: https://alertmanager.midnightthoughts.space
            config:
                global:
                    resolve_timeout: 5m
                    smtp_smarthost: smtp.fastmail.com:587
                    smtp_from: ops@nordgedanken.dev
                    smtp_auth_username: ENC[AES256_GCM,data:42LZYQtTGB/Z+WFxEXF6hM0991Sg/Fbg,iv:bMWJWLvpvTJ5llIIqJHFlqarvL7HFN6E7BW0f48P6WE=,tag:cgEM+qtjHgGIOBMyVy1v/A==,type:str]
                    smtp_auth_password: ENC[AES256_GCM,data:1zP7kCabhhm7gOuwQY76NQ==,iv:Hr9KM0wPU/ji7oPepw3nND7+kmWydnJgAjJMQTY4r6I=,tag:QSTo0bZHloK9uFZIAXkT2w==,type:str]
                    smtp_require_tls: true
                route:
                    receiver: email
                    group_by:
                        - alertname
                        - namespace
                    group_wait: 30s
                    group_interval: 5m
                    repeat_interval: 4h
                    routes:
                        - receiver: "null"
                          matchers:
                            - alertname = "Watchdog"
                        - receiver: "null"
                          matchers:
                            - alertname = "InfoInhibitor"
                        - receiver: "null"
                          matchers:
                            - severity = "info"
                        - receiver: "null"
                          matchers:
                            - alertname = "NodeMemoryHighUtilization"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-plausible-clickhouse-shard0-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-thanos-compact-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "storage-loki-0"
                        - receiver: email
                          matchers:
                            - severity = "critical"
                receivers:
                    - name: "null"
                    - name: email
                      email_configs:
                        - to: mtrnord@nordgedanken.dev
                          send_resolved: true
                inhibit_rules:
                    - source_matchers:
                        - severity = "critical"
                      target_matchers:
                        - severity = "warning"
                      equal:
                        - namespace
                        - alertname
        prometheus:
            prometheusSpec:
                retention: 4h
                externalLabels:
                    k8s_cluster: midnightthoughts
                # Pick up all ServiceMonitors/PodMonitors/etc. regardless of labels
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                ruleNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                # Thanos sidecar uploads completed TSDB blocks to Hetzner S3.
                # First block is cut after ~3h (Prometheus head span must exceed chunkRange × 1.5 = 3h).
                # Subsequent blocks are cut every 2h once the head is warm.
                thanos:
                    objectStorageConfig:
                        existingSecret:
                            name: thanos-objstore-secret
                            key: ENC[AES256_GCM,data:j4ihkDSE,iv:0VJ2yBHSu7LTZkGRoAW8nybyO2TP8bmggd74IBttiuk=,tag:cy7KmSm/vkfjq9hHKlijVQ==,type:str]
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn-2replicas
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 10Gi
        grafana:
            adminPassword: ENC[AES256_GCM,data:VTmvcsCZpcOOC1eZhuY637LlUc+XSYYj0CGihfgoXYBgXFtITdWjsGi2tfUwQJ59OdSDTzKOuXbEhFreiC2/5w==,iv:B4HdY8jkBHY85oiZyEblhXAyedMAYQgyn6X/YwymqJo=,tag:CAqRExW+6yxX139+VDXnPw==,type:str]
            sidecar:
                datasources:
                    # Disable the auto-generated default Prometheus datasource so it
                    # doesn't conflict with our custom datasources.yaml (which points to Thanos)
                    defaultDatasourceEnabled: false
                dashboards:
                    folderAnnotation: grafana_folder
                    provider:
                        foldersFromFilesStructure: true
                    logLevel: WARN
                    watchServerTimeout: 3600
                    enabled: true
            plugins:
                - grafana-piechart-panel
                - grafana-worldmap-panel
                - isovalent-hubble-datasource
                - isovalent-hubbleprocessancestry-panel
                - chaosmeshorg-datasource
            smtp:
                existingSecret: smtp-auth-secret
            extraSecretMounts:
                - name: auth-generic-oauth-secret-mount
                  secretName: auth-generic-oauth-secret
                  defaultMode: 288
                  mountPath: /etc/secrets/auth_generic_oauth
                  readOnly: true
            defaultDashboardsTimezone: Europe/Berlin
            datasources:
                datasources.yaml:
                    apiVersion: 1
                    datasources:
                        - name: Prometheus
                          type: prometheus
                          uid: prometheus
                          url: http://thanos-query-frontend.monitoring.svc.cluster.local:10902
                          access: proxy
                        - name: ChaosMesh
                          type: chaosmeshorg-datasource
                          url: http://chaos-dashboard.chaosmesh.svc.cluster.local:2333
                          access: proxy
                          isDefault: false
                        - name: Hubble
                          type: isovalent-hubble-datasource
                          uid: hubble
                          access: proxy
                          url: http://hubble-relay.kube-system.svc.cluster.local:80
                          isDefault: false
                          jsonData:
                            serviceMap:
                                datasourceUid: prometheus
                            prometheusDatasourceUid: prometheus
                        - name: Postgres-d4all
                          type: postgres
                          uid: postgres-d4all
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: draupnir_synapse
                          user: grafana-ro
                          secureJsonData:
                            password: ENC[AES256_GCM,data:70nrr8ZamA7s9PbaiqB92A4h6we9W8z/5mHXiB1tDiEuWCvw5GJBUm//vYFyCVjU9xt+hv2V7jfVCQVy59U7YA==,iv:nvhQT0Cigz0SJuAWcravNzc0O+dhsuqRAfBHCv/6f2Q=,tag:kdTwmjhBmJsYmvGrC7snmw==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
                        - name: Loki
                          type: loki
                          uid: loki
                          url: http://loki.loki.svc.cluster.local:3100
                          access: proxy
                          isDefault: false
                          jsonData:
                            maxLines: 1000
                        - name: Postgres-connectivity-tester
                          type: postgres
                          uid: postgres-connectivity-tester
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: connectivity-tester
                          user: connectivity-tester
                          secureJsonData:
                            password: ENC[AES256_GCM,data:+Ysf0zwnU7DK+ZGOwLtdD87zqNObKNrZUebaE/NwYswcMYGMkCDkUiE5R8bKgMfgAiDMPxTX0XmlUUDtyO7lfA==,iv:+eR/zxZtQDCgi4FwX5c4oeGtK3Qth/3CJNtUvuw8QE4=,tag:6OtSGFiO2sMgOC+zD64e4Q==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
            ingress:
                enabled: false
            grafana.ini:
                server:
                    root_url: https://grafana.midnightthoughts.space
                smtp:
                    enabled: true
                    host: smtp.fastmail.com:465
                    from_address: ops@nordgedanken.dev
