                    client_id: ENC[AES256_GCM,data:hf2A+rUoHBdStvsdVkrOKFEpcjnO9xkx+ou0VL4tKQ+qEuxL3exXAmzqSUDC5RprfzQ=,iv:vcUMWwji4O434wvREPmFpnK45seoUR56IxAz0GVPdao=,tag:fL71dp9SMGhfBjDl95R6hg==,type:str]
                    client_secret: ENC[AES256_GCM,data:3a+l9Dteo2iiquZjVPWKtLwEy5CcL+49soiu5yTHaZPy5dTKzN0kAvtrBrD7cLLA7kgmtaJn,iv:oKcSbUXEVWJI24NdZ3rulT6N9qC7SYeg3h0uv1cWQEc=,tag:meaXmbh6YDhyao6gRC6cCg==,type:str]
