apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: monitoring
spec:
    interval: 5m
    chart:
        spec:
            version: 82.x
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
            interval: 60m
    install:
        crds: CreateReplace
    upgrade:
        crds: CreateReplace
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    values:
        kubeProxy:
            enabled: false
        alertmanager:
            config:
                global:
                    resolve_timeout: 5m
                    pagerduty_url: https://events.eu.pagerduty.com/v2/enqueue
                route:
                    receiver: pagerduty-warning
                    group_by:
                        - alertname
                        - namespace
                    group_wait: 30s
                    group_interval: 5m
                    repeat_interval: 4h
                    routes:
                        - receiver: "null"
                          matchers:
                            - alertname = "Watchdog"
                        - receiver: "null"
                          matchers:
                            - alertname = "InfoInhibitor"
                        - receiver: "null"
                          matchers:
                            - severity = "info"
                        - receiver: "null"
                          matchers:
                            - alertname = "NodeMemoryHighUtilization"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-plausible-clickhouse-shard0-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-thanos-compact-0"
                        - receiver: pagerduty-draupnir4all
                          matchers:
                            - service_id = "draupnir4all"
                        - receiver: pagerduty-critical
                          matchers:
                            - severity = "critical"
                receivers:
                    - name: "null"
                    - name: pagerduty-critical
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:/evAXuQJ+tsw0fYCIRQr8h76P926neeX8UOJo7GshwI=,iv:1QIwdt5lqSPl3LqDJM3LqA8QvO10at0CCYDDJqbOha4=,tag:5MAClYNY19+y4VceGOOxlw==,type:str]
                          severity: critical
                    - name: pagerduty-warning
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:U1OFIpB47eivaRXiDwDi84fSiVwil2RQdGhIi5QRAds=,iv:IF1Cb2HyDxZWuo9P5szLTNDJZF7ZgCtzpn2WWMyKe0w=,tag:ISRFa4la2YWcNcStv+WAww==,type:str]
                          severity: warning
                    - name: pagerduty-draupnir4all
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:sW+42tJuUDGTfV2loXurV0tBXWaPYg2xaMhrDJ/ZAoQ=,iv:IVmsBvK9OLYyRYliN6M8p1Pm9ptxe//07CTV+1998Fg=,tag:/Q2tT6zfrj3c7Fg0VbHJng==,type:str]
                          severity: critical
                inhibit_rules:
                    - source_matchers:
                        - severity = "critical"
                      target_matchers:
                        - severity = "warning"
                      equal:
                        - namespace
                        - alertname
        prometheus:
            prometheusSpec:
                retention: 4h
                externalLabels:
                    k8s_cluster: midnightthoughts
                # Pick up all ServiceMonitors/PodMonitors/etc. regardless of labels
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                ruleNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                # Thanos sidecar uploads completed TSDB blocks to Hetzner S3.
                # First block is cut after ~3h (Prometheus head span must exceed chunkRange × 1.5 = 3h).
                # Subsequent blocks are cut every 2h once the head is warm.
                thanos:
                    objectStorageConfig:
                        existingSecret:
                            name: thanos-objstore-secret
                            key: ENC[AES256_GCM,data:KN/8pcjW,iv:5zHm8jGG5FdG/G5apUAmtRNFlMKRJIHpbiZnlFWjuu8=,tag:3ywVyNMEQDilsxPCfVDuRg==,type:str]
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn-2replicas
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 10Gi
        grafana:
            adminPassword: ENC[AES256_GCM,data:SJQaetCl3giREAu9gcrb0UseNbjVlYptZlpD4zzKTCpPQmM3zpwUpI6zZ1jp4IRfsealyHkX17iGGD0xqZ0Aog==,iv:ev68ft5FS4NAD3K+g/GNn5iztS9xtJQGmYfoqqUu0Ts=,tag:CrznFX7TwaOgXe3FvWGS1A==,type:str]
            sidecar:
                datasources:
                    # Disable the auto-generated default Prometheus datasource so it
                    # doesn't conflict with our custom datasources.yaml (which points to Thanos)
                    defaultDatasourceEnabled: false
                dashboards:
                    folderAnnotation: grafana_folder
                    provider:
                        foldersFromFilesStructure: true
                    logLevel: WARN
                    watchServerTimeout: 3600
                    enabled: true
            plugins:
                - grafana-piechart-panel
                - grafana-worldmap-panel
                - isovalent-hubble-datasource
                - isovalent-hubbleprocessancestry-panel
                - chaosmeshorg-datasource
            smtp:
                existingSecret: smtp-auth-secret
            extraSecretMounts:
                - name: auth-generic-oauth-secret-mount
                  secretName: auth-generic-oauth-secret
                  defaultMode: 288
                  mountPath: /etc/secrets/auth_generic_oauth
                  readOnly: true
            defaultDashboardsTimezone: Europe/Berlin
            datasources:
                datasources.yaml:
                    apiVersion: 1
                    datasources:
                        - name: Prometheus
                          type: prometheus
                          uid: prometheus
                          url: http://thanos-query-frontend.monitoring.svc.cluster.local:10902
                          access: proxy
                        - name: ChaosMesh
                          type: chaosmeshorg-datasource
                          url: http://chaos-dashboard.chaosmesh.svc.cluster.local:2333
                          access: proxy
                          isDefault: false
                        - name: Hubble
                          type: isovalent-hubble-datasource
                          uid: hubble
                          access: proxy
                          url: http://hubble-relay.kube-system.svc.cluster.local:80
                          isDefault: false
                          jsonData:
                            serviceMap:
                                datasourceUid: prometheus
                            prometheusDatasourceUid: prometheus
                        - name: Postgres-d4all
                          type: postgres
                          uid: postgres-d4all
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: draupnir_synapse
                          user: grafana-ro
                          secureJsonData:
                            password: ENC[AES256_GCM,data:lxEfvcWhj4a4QWhR5Kc6gvbKqkI/ggJkScdorTDIE4srscXoJP/5nbQ/5l9qJsvHpg0GYletsou5yEdbF8P/Bw==,iv:Fz3OLwIrcha3EUzWeKPWXNGZZ1SKpYQHYl4qontUDz8=,tag:CmyljLWOVx8LYIV4/35BKg==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
                        - name: Loki
                          type: loki
                          uid: loki
                          url: http://loki-singleBinary.loki.svc.cluster.local:3100
                          access: proxy
                          isDefault: false
                          jsonData:
                            maxLines: 1000
                        - name: Postgres-connectivity-tester
                          type: postgres
                          uid: postgres-connectivity-tester
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: connectivity-tester
                          user: connectivity-tester
                          secureJsonData:
                            password: ENC[AES256_GCM,data:Zyfxsr/g/JbnyjopG5Ma1pxFqlTq+YoVPYUkfms0BMByCi1AT9DUXKh43LC1S3B8xax9c46EfYjS2fILy7GSzA==,iv:B8NA6A5HzEsBWQFvSYN0ZUXPH6M5JAVB/3dHuLmd/5o=,tag:V5a+yW6/7AvNvksk961mZg==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
            ingress:
                enabled: false
            grafana.ini:
                server:
                    root_url: https://grafana.midnightthoughts.space
                smtp:
                    enabled: true
                    host: smtp.fastmail.com:465
                    from_address: ops@nordgedanken.dev
                paths:
