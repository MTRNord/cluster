                    client_id: ENC[AES256_GCM,data:hBBgtqXkxyWiOMzx1FwG0TmxUOSAtd8ZLXfCszHRHrf2cJFwZMlVbAncaEYaz5plvqs=,iv:RmEFW52p4Inw7VIKn/lNxs9BonGHYmxtOm3Lzsj8PQM=,tag:g8GSiBGzhhEj7lC0IINHXQ==,type:str]
                    client_secret: ENC[AES256_GCM,data:CwC+7c2YrujdzbnFaVGNzjY+TzHT+MgmInevDhGincsqoX+bwsyG7ky5QC4bQlnAGXOzn5kU,iv:MJH3kjkg7F0qFPzkL95iO1S9m20AiT24B0j1srYjZUc=,tag:3Ld2/MWajefcbeKBbh1K1Q==,type:str]
