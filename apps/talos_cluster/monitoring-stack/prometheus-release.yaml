                    client_id: ENC[AES256_GCM,data:vC7wSpZmpFKnU931t3EAjcKVfjmPILD+PIKlHEa7qB6JTbPxfrhO/00upkPgeg1z23Q=,iv:dvdA07VK5mhUoR/x5kbXY9nsDiEsyzSOQj19zz7p13E=,tag:0WhdmAj2X6qm7jSDnzRztQ==,type:str]
