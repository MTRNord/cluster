apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: monitoring
spec:
    interval: 5m
    chart:
        spec:
            version: 82.x
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
            interval: 60m
    install:
        crds: CreateReplace
    upgrade:
        crds: CreateReplace
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    values:
        kubeProxy:
            enabled: false
        alertmanager:
            config:
                global:
                    resolve_timeout: 5m
                    pagerduty_url: https://events.eu.pagerduty.com/v2/enqueue
                route:
                    receiver: pagerduty-warning
                    group_by:
                        - alertname
                        - namespace
                    group_wait: 30s
                    group_interval: 5m
                    repeat_interval: 4h
                    routes:
                        - receiver: "null"
                          matchers:
                            - alertname = "Watchdog"
                        - receiver: "null"
                          matchers:
                            - alertname = "InfoInhibitor"
                        - receiver: "null"
                          matchers:
                            - severity = "info"
                        - receiver: "null"
                          matchers:
                            - alertname = "NodeMemoryHighUtilization"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-plausible-clickhouse-shard0-0"
                        - receiver: "null"
                          matchers:
                            - alertname = "KubePersistentVolumeFillingUp"
                            - persistentvolumeclaim = "data-thanos-compact-0"
                        - receiver: pagerduty-draupnir4all
                          matchers:
                            - service_id = "draupnir4all"
                        - receiver: pagerduty-critical
                          matchers:
                            - severity = "critical"
                receivers:
                    - name: "null"
                    - name: pagerduty-critical
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:msd7Hvc9/oTFYZIx6SmpPPY1N8PAtAKW2uOKYflpzW0=,iv:rDBCpnnbSkHZ3M9dx3ZPpPtvo0pvsJMo+Bbbcozo0vY=,tag:8x8D2f8m/YXKd7JH2jvagA==,type:str]
                          severity: critical
                    - name: pagerduty-warning
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:rVAWS9b1IxwDbRv7CKBtAY+cZQpA7Mum1c4N6vt1MdI=,iv:XwT2bp4UBBV0+OxRKPQgOzx8+iS5Vj+6mW3NSN7/vxM=,tag:kl2bWdSDfcdBD/FC/6+/LQ==,type:str]
                          severity: warning
                    - name: pagerduty-draupnir4all
                      pagerduty_configs:
                        - routing_key: ENC[AES256_GCM,data:bjJMoEaGc/1fCYw8wuCUfA2EdthvdwrntgeUrbBD1zU=,iv:fAx0oadzF5h9SvBBZu+KVM2iKgzx3jQScCDn4JG9U/8=,tag:Z+mD7amYSENq6Y24xXOsQw==,type:str]
                          severity: critical
                inhibit_rules:
                    - source_matchers:
                        - severity = "critical"
                      target_matchers:
                        - severity = "warning"
                      equal:
                        - namespace
                        - alertname
        prometheus:
            prometheusSpec:
                retention: 4h
                externalLabels:
                    k8s_cluster: midnightthoughts
                # Pick up all ServiceMonitors/PodMonitors/etc. regardless of labels
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                ruleNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                # Thanos sidecar uploads completed TSDB blocks to Hetzner S3.
                # First block is cut after ~3h (Prometheus head span must exceed chunkRange × 1.5 = 3h).
                # Subsequent blocks are cut every 2h once the head is warm.
                thanos:
                    objectStorageConfig:
                        existingSecret:
                            name: thanos-objstore-secret
                            key: ENC[AES256_GCM,data:OL83VUBf,iv:5QkLUpS+lY+R2IIziXTpcvo8GnQoLpSGu/k3CnQ9lsM=,tag:peyoAey73/MtJnYXAiCbag==,type:str]
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn-2replicas
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 10Gi
        grafana:
            adminPassword: ENC[AES256_GCM,data:+bM7NCFbch8q9MERsdDTL0fU81Nlpdak98uXKcKCNxc0K4FQ7Sw71+rBujXOLgcLpq484+Fz68/brjOyvgywtQ==,iv:KGqEb2R3iMNA/ZPJLtJi5Jr8yIIipxgZDng7IzVr8yI=,tag:ugBaufWSWvUkyr82JNUrCw==,type:str]
            sidecar:
                datasources:
                    # Disable the auto-generated default Prometheus datasource so it
                    # doesn't conflict with our custom datasources.yaml (which points to Thanos)
                    defaultDatasourceEnabled: false
                dashboards:
                    folderAnnotation: grafana_folder
                    provider:
                        foldersFromFilesStructure: true
                    logLevel: WARN
                    watchServerTimeout: 3600
                    enabled: true
            plugins:
                - grafana-piechart-panel
                - grafana-worldmap-panel
                - isovalent-hubble-datasource
                - isovalent-hubbleprocessancestry-panel
                - chaosmeshorg-datasource
            smtp:
                existingSecret: smtp-auth-secret
            extraSecretMounts:
                - name: auth-generic-oauth-secret-mount
                  secretName: auth-generic-oauth-secret
                  defaultMode: 288
                  mountPath: /etc/secrets/auth_generic_oauth
                  readOnly: true
            defaultDashboardsTimezone: Europe/Berlin
            datasources:
                datasources.yaml:
                    apiVersion: 1
                    datasources:
                        - name: Prometheus
                          type: prometheus
                          uid: prometheus
                          url: http://thanos-query-frontend.monitoring.svc.cluster.local:10902
                          access: proxy
                        - name: ChaosMesh
                          type: chaosmeshorg-datasource
                          url: http://chaos-dashboard.chaosmesh.svc.cluster.local:2333
                          access: proxy
                          isDefault: false
                        - name: Hubble
                          type: isovalent-hubble-datasource
                          uid: hubble
                          access: proxy
                          url: http://hubble-relay.kube-system.svc.cluster.local:80
                          isDefault: false
                          jsonData:
                            serviceMap:
                                datasourceUid: prometheus
                            prometheusDatasourceUid: prometheus
                        - name: Postgres-d4all
                          type: postgres
                          uid: postgres-d4all
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: draupnir_synapse
                          user: grafana-ro
                          secureJsonData:
                            password: ENC[AES256_GCM,data:ROEKJyJf3sSLunyeRucs03fc2rh9zADHuYkDJtBCJ7sDHoIXcfDF0GZ9eLDmEFH7reEaU2W/AeKYwqXdqiMChw==,iv:SE/mMMCt7m2JqHGttZ89j7XhS4QyrcSqRcW64n1wL5U=,tag:KkoutasJUiTQK/K6Yd6MPA==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
                        - name: Postgres-connectivity-tester
                          type: postgres
                          uid: postgres-connectivity-tester
                          access: proxy
                          url: pg-cluster-v2-ro.postgres-cluster.svc.cluster.local:5432
                          database: connectivity-tester
                          user: connectivity-tester
                          secureJsonData:
                            password: ENC[AES256_GCM,data:AbPVjmC4uSuDkFZCDTjw3XxyZBpIYlctb+Oqmy2Z2+hGqAnptK3yyDQFNEoNnes6JKG7X1UbJyjXZbJppEkwRg==,iv:5nG1kfwP2s8mSYCYjCI8en2uTpO3JDmdde7qJ8kW/s4=,tag:zF86+e6YZMpk05QVf0obOQ==,type:str]
                          isDefault: false
                          jsonData:
                            sslmode: disable
                            maxIdleConnsAuto: true
                            timescaledb: false
                            maxOpenConns: 10
                            maxIdleConns: 10
            ingress:
                enabled: false
            grafana.ini:
                server:
                    root_url: https://grafana.midnightthoughts.space
                smtp:
                    enabled: true
                    host: smtp.fastmail.com:465
                    from_address: ops@nordgedanken.dev
                paths:
