                    client_id: ENC[AES256_GCM,data:k5TIhkbslUOjEJLZbTkkkfT9BKNCg4xb8qBGksLdaiOtsE5otqJPlyWqh4+FKz9+D5E=,iv:DVyRjIyNrEEgWPNb0HCDLjOP9/fMR8aSQFeB1o4+28I=,tag:RB211LaE4ndflIlHg39EFA==,type:str]
                    client_secret: ENC[AES256_GCM,data:E9JLK4rY6gM1pzQBlARsZC8r8O6cZW12vZ+IbeFFGgYNTXcP/tHn4hozMj4iEkwMLuO2QGcP,iv:w9r/FuiVGfvQLXrz0DdjK2lsN6BHZp5ZtVK0BQZhhA0=,tag:6ifozNd919w+Wl1M/tfTOw==,type:str]
