apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway
  namespace: envoy-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
  gatewayClassName: envoy-gateway-class
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/access: public
      load-balancer.hetzner.cloud/location: hel1
      load-balancer.hetzner.cloud/name: envoy
      load-balancer.hetzner.cloud/use-private-ip: "true"
      load-balancer.hetzner.cloud/uses-proxyprotocol: "true"
  # no wildcards due to Envoy bug: https://github.com/envoyproxy/gateway/issues/2675#issuecomment-1960449002
  listeners:
    - name: ssh
      protocol: TCP
      port: 22
      allowedRoutes:
        kinds:
          - kind: TCPRoute
        namespaces:
          from: Selector
          selector:
            matchLabels:
              app: cgit
    - name: https-talos-midnightthoughts
      protocol: HTTPS
      hostname: "talos.midnightthoughts.space"
      port: 443
      allowedRoutes:
        namespaces:
          from: "All"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: talos.midnightthoughts.space-tls
    - name: https-alertmanager-midnightthoughts
