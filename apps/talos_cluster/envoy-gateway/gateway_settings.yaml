---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-redirect
  namespace: envoy-gateway
spec:
  parentRefs:
    - name: envoy-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: email-policy
  namespace: envoy-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: email-gateway
  # WARNING: Cilium 1.17+ only supports the correct ipMode magic for this to work. Hence it currently fails
  enableProxyProtocol: true
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: enable-proxy-protocol-policy
  namespace: envoy-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  # WARNING: Cilium 1.17+ only supports the correct ipMode magic for this to work. Hence it currently fails
  enableProxyProtocol: true
  # Alternative to enableProxyProtocol: true
  #clientIPDetection:
  #    xForwardedFor:
  #        trustedCIDRs:
  #            - 10.10.0.0/16
  #            - 100.96.0.0/16
  tcpKeepalive:
    idleTime: 1h
    interval: 75s
    probes: 9
  path:
    escapedSlashesAction: KeepUnchanged
---
# Monitors the above gateway using a servicemonitor
# First we do a service matching on the labels "gateway.envoyproxy.io/owning-gateway-name: envoy-gateway" and "gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway"
kind: Service
apiVersion: v1
metadata:
  name: envoy-gateway-monitor
  namespace: envoy-gateway
  labels:
    proxy: envoy
spec:
  selector:
    gateway.envoyproxy.io/owning-gateway-name: envoy-gateway
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway
  ports:
    - name: metrics
      port: 19001
      targetPort: 19001
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: envoy-gateway-monitor
  namespace: envoy-gateway
spec:
  selector:
    matchLabels:
      proxy: envoy
  endpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: envoy-gateway-controlplane-monitor
  namespace: envoy-gateway
spec:
  selector:
    matchLabels:
      control-plane: envoy-gateway
  endpoints:
    - port: metrics
      interval: 10s
