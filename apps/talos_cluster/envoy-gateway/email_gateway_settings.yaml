        kinds:
          - kind: TCPRoute
        namespaces:
          from: All
    - name: imap
      protocol: TCP
      port: 143
      allowedRoutes:
        kinds:
          - kind: TCPRoute
        namespaces:
          from: All
    - name: imaps
      protocol: TCP
      port: 993
      allowedRoutes:
        kinds:
          - kind: TCPRoute
        namespaces:
          from: All
    - name: https-stalwart-nordgedanken
      protocol: HTTPS
      hostname: "stalwart.nordgedanken.dev"
      port: 443
      allowedRoutes:
        namespaces:
          from: "All"
      tls:
        mode: Terminate
        certificateRefs:
