apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: email-proxy-config
  namespace: envoy-gateway
spec:
  ipFamily: DualStack
  routingType: Service
  extraArgs:
    - --use-dynamic-base-id
  provider:
    type: Kubernetes
    kubernetes:
      useListenerPortAsContainerPort: true
      envoyService:
        type: LoadBalancer
        patch:
          type: StrategicMerge
          value:
            spec:
              ipFamilyPolicy: DualStack
              ipFamilies:
                - IPv4
                - IPv6
              externalIPs:
                - 65.21.7.19
                - 2a01:4f9:c010:88a1::1
                - 157.180.84.123
                - 2a01:4f9:c012:96a5::1
                - 46.225.115.168
                - 2a01:4f8:1c18:222e::1
                - 116.203.40.165
                - 2a01:4f8:1c0c:66d3::1
                - 46.225.148.120
                - 2a01:4f8:c014:3000::1
                - 138.199.144.31
                - 2a01:4f8:c014:1a0e::1
      envoyDaemonSet:
        patch:
          type: StrategicMerge
          value:
            spec:
              updateStrategy:
                type: OnDelete
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
        container:
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
  logging:
    level:
      default: info
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: GatewayClass
metadata:
  name: email-gateway-class
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: email-proxy-config
    namespace: envoy-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: email-gateway
  namespace: envoy-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
  # addresses:
  #   - type: IPAddress
  #     value: 65.21.7.19
  #   - type: IPAddress
  #     value: 2a01:4f9:c010:88a1::1
