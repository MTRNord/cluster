apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: stalwart-smtp
  namespace: stalwart
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mail.midnightthoughts.space
spec:
  parentRefs:
    - name: email-gateway
      namespace: envoy-gateway
      sectionName: smtp
  rules:
    - backendRefs:
        - name: stalwart-mail
          port: 25
---
