---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: stalwart-mail-policy
  namespace: stalwart
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: stalwart-smtp
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: stalwart-submissions
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: stalwart-submission
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: stalwart-imap
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: stalwart-imaps
  proxyProtocol:
    version: "V2"
