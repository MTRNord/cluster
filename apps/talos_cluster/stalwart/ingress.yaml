apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stalwart-admin
  namespace: stalwart
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
      sectionName: https-stalwart-nordgedanken
  hostnames:
    - stalwart.nordgedanken.dev
  rules:
    - backendRefs:
        - name: stalwart-mail
          port: 80
