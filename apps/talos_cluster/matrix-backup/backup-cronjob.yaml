apiVersion: batch/v1
kind: CronJob
metadata:
  name: matrix-backup
  namespace: matrix-backup
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          automountServiceAccountToken: false
          enableServiceLinks: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: registry.midnightthoughts.space/mtrnord/cluster/matrix-backup:main
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                - name: HOMESERVER
                  value: "https://matrix.mtrnord.blog"
                - name: S3_ENDPOINT
                  value: "hel1.your-objectstorage.com"
                - name: S3_BUCKET
                  value: "midnightthoughts-matrix-backup"
                - name: MTRNORD_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: mtrnord_password
                - name: MTRNORD_SSSS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: mtrnord_ssss_recovery_key
                - name: LEXI_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: lexi_password
                - name: LEXI_SSSS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: lexi_ssss_recovery_key
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: s3_access_key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: s3_secret_key
                - name: KEY_EXPORT_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: key_export_passphrase
                - name: AGE_RECIPIENTS
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: age_recipients
                - name: AGE_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: matrix-backup-secret
                      key: age_private_key
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              emptyDir: {}
            - name: tmp
              emptyDir: {}
