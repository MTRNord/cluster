apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: jenkins
  namespace: jenkins

# Stage 1: Operator deployment resources
resources:
  - namespace.yaml
  - helm-repository.yaml
  - operator-release.yaml
  - instance

# Ensure operator is fully reconciled before creating Jenkins CRD
# (kubectl apply will still need manual stage 2, or use Flux for automatic ordering)
