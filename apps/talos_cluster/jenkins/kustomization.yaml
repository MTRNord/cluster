apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: jenkins
  namespace: jenkins

# Stage 1: Deploy operator (creates CRD)
resources:
  - namespace.yaml
  - helm-repository.yaml
  - operator-release.yaml

# Stage 2: Deploy Jenkins instance (after CRD exists)
bases:
  - instance
