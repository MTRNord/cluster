apiVersion: jenkins.io/v1alpha2
kind: Jenkins
metadata:
    name: jenkins
    namespace: jenkins
spec:
    # Enable security validation
    validateSecurityWarnings: true
    # Configuration as Code
    configurationAsCode:
        configurations:
            - name: jenkins-casc
              content: ENC[AES256_GCM,data:,iv:D6oladjgKIpT/F7H542ciASjAkz9OhdZDxUb5RPXNVQ=,tag:JN/gUMq+qwhh0Q+PgTFc9A==,type:str]
    # API settings - IMPORTANT: jenkins-operator user must have admin rights
    jenkinsAPISettings:
        authorizationStrategy: createUser
    # Service configuration
    service:
        type: ClusterIP
        port: 8080
    slaveService:
        type: ClusterIP
        port: 50000
    # Master/Controller pod specification
    master:
        # Use specific LTS version instead of latest (best practice)
        image: jenkins/jenkins:2.541.3-lts
        imagePullPolicy: IfNotPresent
        # Security context - run as jenkins user (1000)
        securityContext:
            runAsUser: 1000
            fsGroup: 1000
        # Disable CSRF protection is not recommended - keep enabled (default)
        disableCSRFProtection: false
        # Annotations and labels
        annotations:
            description: Jenkins instance for multi-arch container builds
        labels:
            app: jenkins
            version: lts
        # Base plugins (required by operator)
        basePlugins:
            - name: kubernetes
              version: 4423.vb_59f230b_ce53
            - name: workflow-job
              version: 1573.v1465f6f78810
            - name: workflow-aggregator
              version: 608.v67378e9d3db_1
            - name: git
              version: 5.10.1
            - name: job-dsl
              version: 3654.vdf58f53e2d15
            - name: configuration-as-code
              version: 2065.v7a_20a_b_d84088
            - name: kubernetes-credentials-provider
              version: 1.303.vdfcf47fb_b_fef
        # Additional plugins for our use case
        plugins:
            - name: oic-auth
              version: 4.668.v653c6b_c6cb_f5
            - name: matrix-auth
              version: 3.2.9
            - name: pipeline-stage-view
              version: "2.39"
            - name: generic-webhook-trigger
              version: 2.4.1
            - name: timestamper
              version: "1.30"
            - name: ansicolor
              version: 536.v13fa_b_860c267
            - name: docker-workflow
              version: 634.vedc7242b_eda_7
        # Container specification
        containers:
            - name: jenkins-master
              image: jenkins/jenkins:2.440.1-lts
              imagePullPolicy: IfNotPresent
              # Security context for container
              securityContext:
                # Allow privileged for Docker socket access
                privileged: true
                allowPrivilegeEscalation: true
              # Environment variables
              env:
                - name: JAVA_OPTS
                  value: -Djenkins.install.runSetupWizard=false -Djenkins.model.Jenkins.crumbIssuerProxyCompatibility=true -Dorg.jenkinsci.plugins.matrixauth.inheritance.InheritParentStrategy=true
              # Liveness probe
              livenessProbe:
                failureThreshold: 12
                httpGet:
                    path: /login
                    port: 8080
                    scheme: HTTP
                initialDelaySeconds: 100
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 5
              # Readiness probe
              readinessProbe:
                failureThreshold: 10
                httpGet:
                    path: /login
                    port: 8080
                    scheme: HTTP
                initialDelaySeconds: 80
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              # Resource management
              resources:
                limits:
                    cpu: 1500m
                    memory: 2Gi
                requests:
                    cpu: 500m
                    memory: 1Gi
              # Port configuration
              ports:
                - containerPort: 8080
                  name: http
                  protocol: TCP
                - containerPort: 50000
                  name: agent
                  protocol: TCP
              # Volume mounts
              volumeMounts:
                - name: jenkins-home
                  mountPath: /var/jenkins_home
                - name: registry-secret
                  mountPath: /var/run/secrets/docker.io
                  readOnly: true
                - name: cosign-key
                  mountPath: /var/run/secrets/cosign
                  readOnly: true
                - name: docker-sock
                  mountPath: /var/run/docker.sock
        # Volumes
        volumes:
            - name: jenkins-home
              persistentVolumeClaim:
                claimName: jenkins-home
            - name: registry-secret
              secret:
                secretName: ENC[AES256_GCM,data:7USvSu9F1aAzUvE5GsVwJJVhwAg=,iv:gjniozAMy7KJbN92QTUz/dF1GJxd4cCNMry0foTi/ig=,tag:b1j7RzItnt+Ck+gmnBBgIQ==,type:str]
                defaultMode: ENC[AES256_GCM,data:XRRC,iv:OhIgPF2mFh3kvms/rH58YeL2pmYUeWCSO7PDuhZpUZE=,tag:M77Kj3TEHZ0/ZOClsCF2xA==,type:int]
            - name: cosign-key
              secret:
                secretName: ENC[AES256_GCM,data:ikUpHd2Wf3Xrc6l6C6Q15cJF,iv:kyJMlr5Mt0zHnQF2zrxZOgtGrEcg9F1PW5mav2OCgTE=,tag:vVnYPpGRWVljMbfaKos8qA==,type:str]
                defaultMode: ENC[AES256_GCM,data:d958,iv:yEtCjaXo2Ai0ARBYIT+zCNdlkgMgRI3WO5iy1VEMNn4=,tag:0t/3muHtG//KomxrpmTQyQ==,type:int]
            - name: docker-sock
              hostPath:
                path: /var/run/docker.sock
                type: Socket
