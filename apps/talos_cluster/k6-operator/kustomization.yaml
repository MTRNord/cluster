apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - repository.yaml
  - release.yaml
  - rbac.yaml
  - cronjobs.yaml
# k6 test scripts — mounted by k6 runner pods in the matrix namespace
configMapGenerator:
  - name: k6-scripts
    namespace: matrix
    files:
      - scripts/config.js
      - scripts/smoke.js
      - scripts/health.js
      - scripts/federation.js
      - scripts/soak-with-memory-check.js
    options:
      disableNameSuffixHash: true
