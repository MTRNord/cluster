# ── Soak: every 6 hours (on the hour), 30 min, memory leak detection ────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-soak
  namespace: k6-operator
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: k6-cronjob
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: runner
              image: docker.io/alpine/k8s:1.32.3
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  NAME="k6-soak-$(date +%s)"
                  kubectl -n matrix apply -f - << EOF
                  apiVersion: k6.io/v1alpha1
                  kind: TestRun
                  metadata:
                    name: ${NAME}
                    namespace: matrix
                  spec:
                    parallelism: 1
                    cleanup: "post"
                    script:
                      configMap:
                        name: k6-scripts
                        file: soak-with-memory-check.js
                    arguments: --out experimental-prometheus-rw
                    runner:
                      env:
                        - name: K6_PROMETHEUS_RW_SERVER_URL
                          value: http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write
                        - name: K6_PROMETHEUS_RW_STALE_MARKERS
                          value: "true"
                        - name: BASE_URL
                          value: http://connectivity-tester-stage.matrix.svc.cluster.local:8080
                        - name: PROMETHEUS_URL
                          value: http://prometheus-operated.monitoring.svc.cluster.local:9090
                        - name: MEMORY_GROWTH_THRESHOLD
                          value: "0.30"
                  EOF
                  TIMEOUT=2700
                  START=$(date +%s)
                  while true; do
                    STAGE=$(kubectl -n matrix get testrun/"${NAME}" -o jsonpath='{.status.stage}' 2>/dev/null || true)
                    echo "Stage: ${STAGE}"
                    case "${STAGE}" in finished|error) break ;; esac
                    [ $(($(date +%s) - START)) -ge ${TIMEOUT} ] && { echo "Timed out"; break; }
                    sleep 30
                  done
                  kubectl -n matrix delete testrun/"${NAME}" --ignore-not-found
