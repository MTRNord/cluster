# Common env vars injected into every k6 TestRun runner via the CronJob shell scripts:
#   K6_PROMETHEUS_RW_SERVER_URL — pushes metrics to Prometheus remote-write receiver
#   K6_PROMETHEUS_RW_STALE_MARKERS — marks stale series when the test ends
#   BASE_URL — connectivity-tester-stage internal cluster address
#
# SERVER_NAMES is intentionally NOT set; config.js default (matrix.org,maunium.net,mtrnord.blog) is used.
#
# cleanup: "post" on every TestRun tells the operator to delete the TestRun object
# after all pods complete, so stale objects don't accumulate even if the CronJob
# pod crashes before it can run its own kubectl delete at the end.
---
# ── Smoke: every 5 minutes, ~10 s, sanity check all endpoints ──────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-smoke
  namespace: k6-operator
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: k6-cronjob
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: runner
              image: docker.io/alpine/k8s:1.32.3
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  NAME="k6-smoke-$(date +%s)"
                  kubectl -n matrix apply -f - << EOF
                  apiVersion: k6.io/v1alpha1
                  kind: TestRun
                  metadata:
                    name: ${NAME}
                    namespace: matrix
                  spec:
                    parallelism: 1
                    cleanup: "post"
                    script:
                      configMap:
                        name: k6-scripts
                        file: smoke.js
                    arguments: --out experimental-prometheus-rw
                    runner:
                      env:
                        - name: K6_PROMETHEUS_RW_SERVER_URL
                          value: http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write
                        - name: K6_PROMETHEUS_RW_STALE_MARKERS
                          value: "true"
                        - name: BASE_URL
                          value: http://connectivity-tester-stage.matrix.svc.cluster.local:8080
                  EOF
                  TIMEOUT=300
                  START=$(date +%s)
                  while true; do
                    STAGE=$(kubectl -n matrix get testrun/"${NAME}" -o jsonpath='{.status.stage}' 2>/dev/null || true)
                    echo "Stage: ${STAGE}"
                    case "${STAGE}" in finished|error) break ;; esac
                    [ $(($(date +%s) - START)) -ge ${TIMEOUT} ] && { echo "Timed out"; break; }
                    sleep 10
                  done
                  kubectl -n matrix delete testrun/"${NAME}" --ignore-not-found
