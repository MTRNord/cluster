apiVersion: v1
kind: ServiceAccount
metadata:
  name: k6-cronjob
  namespace: k6-operator
---
# Role in the matrix namespace so CronJob pods can manage TestRun objects there
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k6-testrun-manager
  namespace: matrix
rules:
  - apiGroups: ["k6.io"]
    resources: ["testruns"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
# Bind the k6-operator SA to the matrix-namespace role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k6-cronjob-testrun-manager
  namespace: matrix
subjects:
  - kind: ServiceAccount
    name: k6-cronjob
    namespace: k6-operator
roleRef:
  kind: Role
  name: k6-testrun-manager
  apiGroup: rbac.authorization.k8s.io
