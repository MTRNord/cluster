apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: image-builder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      containers:
        - name: buildkitd
          # Pin to a specific version — update to latest stable as needed
          image: moby/buildkit:v0.29.0
          args:
            - --addr
            - tcp://0.0.0.0:1234
          ports:
            - containerPort: 1234
              protocol: TCP
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://localhost:1234
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
            - name: docker-config
              mountPath: /root/.docker
              readOnly: true
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkitd-cache
        - name: docker-config
          secret:
            secretName: image-builder-registry-secret
            items:
              - key: dockerconfig.json
                path: config.json
