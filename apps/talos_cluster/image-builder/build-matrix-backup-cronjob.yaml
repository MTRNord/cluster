apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-matrix-backup
  namespace: image-builder
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: image-builder-cronjob
          restartPolicy: Never
          initContainers:
            - name: clone-repo
              image: alpine/git:latest
              command:
                - git
                - clone
                - --depth=1
                - https://github.com/MTRNord/cluster.git
                - /workspace
              volumeMounts:
                - name: workspace
                  mountPath: /workspace

          containers:
            - name: build
              image: alpine:3
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache podman cosign git iptables >/dev/null

                  mkdir -p /etc/containers
                  cat > /etc/containers/storage.conf << 'STORAGE_EOF'
                  [storage]
                  driver = "vfs"
                  STORAGE_EOF

                  mkdir -p /root/.docker
                  cp /registry-secret/dockerconfig.json /root/.docker/config.json

                  TAG_TS="$(date -u +%Y%m%d-%H%M%S)"
                  TAG_SHA="sha-$(git -C /workspace rev-parse --short HEAD)"
                  IMAGE="registry.midnightthoughts.space/mtrnord/cluster/matrix-backup"

                  echo "==> Building ${IMAGE}:${TAG_TS}"

                  podman build \
                    --platform linux/amd64,linux/arm64 \
                    --manifest "${IMAGE}:${TAG_TS}" \
                    -f /workspace/apps/talos_cluster/matrix-backup/backup-tool/Dockerfile \
                    /workspace/apps/talos_cluster/matrix-backup/backup-tool

                  podman manifest push --all "${IMAGE}:${TAG_TS}" "docker://${IMAGE}:${TAG_TS}"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:main"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:${TAG_SHA}"
                  podman push "${IMAGE}:main"
                  podman push "${IMAGE}:${TAG_SHA}"

                  DIGEST="$(podman inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG_TS}" | cut -d@ -f2)"
                  [ -z "$DIGEST" ] && echo "Failed to get digest" && exit 1
                  echo "==> Digest: ${DIGEST}"

                  COSIGN_PASSWORD="$(cat /cosign-secret/cosign.password)" \
                  cosign sign --yes \
                    --key /cosign-secret/cosign.key \
                    --new-bundle-format=false \
                    --use-signing-config=false \
                    --registry-referrers-mode=oci-1-1 \
                    "${IMAGE}@${DIGEST}"

                  echo "==> Done: ${IMAGE}:${TAG_TS}"
              env:
                - name: COSIGN_OCI_EXPERIMENTAL
                  value: "1"
                - name: COSIGN_EXPERIMENTAL
                  value: "1"
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                  readOnly: true
                - name: registry-secret
                  mountPath: /registry-secret
                  readOnly: true
                - name: cosign-secret
                  mountPath: /cosign-secret
                  readOnly: true

          volumes:
            - name: workspace
              emptyDir: {}
            - name: registry-secret
              secret:
                secretName: image-builder-registry-secret
            - name: cosign-secret
              secret:
                secretName: image-builder-cosign-secret
