apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-blog
  namespace: image-builder
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: image-builder-cronjob
          restartPolicy: Never
          initContainers:
            - name: clone-repo
              image: alpine/git:latest
              command:
                - git
                - clone
                - --depth=1
                - https://github.com/MTRNord/cluster.git
                - /workspace
              volumeMounts:
                - name: workspace
                  mountPath: /workspace

          containers:
            - name: build
              image: alpine:3
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache podman git iptables jq >/dev/null
                  
                  # Install cosign v3.0.6
                  wget -q https://github.com/sigstore/cosign/releases/download/v3.0.6/cosign-linux-amd64 -O /tmp/cosign && chmod +x /tmp/cosign

                  mkdir -p /etc/containers
                  cat > /etc/containers/storage.conf << 'STORAGE_EOF'
                  [storage]
                  driver = "vfs"
                  STORAGE_EOF

                  mkdir -p /root/.docker
                  cp /registry-secret/dockerconfig.json /root/.docker/config.json

                  TAG_TS="$(date -u +%Y%m%d-%H%M%S)"
                  TAG_SHA="sha-$(git -C /workspace rev-parse --short HEAD)"
                  IMAGE="registry.midnightthoughts.space/mtrnord/blog"

                  echo "==> Building ${IMAGE}:${TAG_TS}"

                  podman build \
                    --platform linux/amd64,linux/arm64 \
                    --manifest "${IMAGE}:${TAG_TS}" \
                    -f /workspace/apps/talos_cluster/blog/docker/Dockerfile \
                    /workspace/apps/talos_cluster/blog/docker

                  podman manifest push --all "${IMAGE}:${TAG_TS}" "docker://${IMAGE}:${TAG_TS}"
                  podman pull "${IMAGE}:${TAG_TS}"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:latest"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:${TAG_SHA}"
                  podman push "${IMAGE}:latest"
                  podman push "${IMAGE}:${TAG_SHA}"

                  # Pull again to refresh digest from registry
                  podman rmi "${IMAGE}:${TAG_TS}" "${IMAGE}:main" "${IMAGE}:${TAG_SHA}" || true
                  sleep 2
                  podman pull "${IMAGE}:${TAG_TS}"

                  # Get manifest list digest with retry (registry indexing may take time)
                  MANIFEST_LIST_DIGEST=""
                  for attempt in 1 2 3 4 5; do
                    MANIFEST_LIST_DIGEST="$(podman image inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG_TS}" | cut -d@ -f2)"
                    if [ -n "$MANIFEST_LIST_DIGEST" ]; then
                      break
                    fi
                    if [ $attempt -lt 5 ]; then
                      echo "Waiting for registry to index manifest (attempt $attempt/5)..."
                      sleep 3
                    fi
                  done
                  
                  [ -z "$MANIFEST_LIST_DIGEST" ] && echo "Failed to get manifest list digest after retries" && exit 1
                  echo "==> Manifest List Digest: ${MANIFEST_LIST_DIGEST}"
                  
                  # Wait a bit more to ensure registry has the digest available for signing
                  sleep 2
                  
                  COSIGN_PASSWORD="$(cat /cosign-secret/cosign.password)" \
                  /tmp/cosign sign --yes \
                    --key /cosign-secret/cosign.key \
                    --new-bundle-format=false \
                    --use-signing-config=false \
                    --registry-referrers-mode=oci-1-1 \
                    "${IMAGE}@${MANIFEST_LIST_DIGEST}"
                  
                  # Sign each platform digest
                  podman manifest inspect "${IMAGE}:${TAG_TS}" | jq -r '.manifests[].digest' | while read -r DIGEST; do
                    [ -z "$DIGEST" ] && continue
                    echo "==> Signing platform digest: ${DIGEST}"
                    COSIGN_PASSWORD="$(cat /cosign-secret/cosign.password)" \
                    /tmp/cosign sign --yes \
                      --key /cosign-secret/cosign.key \
                      --new-bundle-format=false \
                      --use-signing-config=false \
                      --registry-referrers-mode=oci-1-1 \
                      "${IMAGE}@${DIGEST}" || true
                  done

                  echo "==> Done: ${IMAGE}:${TAG_TS}"
              env:
                - name: COSIGN_OCI_EXPERIMENTAL
                  value: "1"
                - name: COSIGN_EXPERIMENTAL
                  value: "1"
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                  readOnly: true
                - name: registry-secret
                  mountPath: /registry-secret
                  readOnly: true
                - name: cosign-secret
                  mountPath: /cosign-secret
                  readOnly: true

          volumes:
            - name: workspace
              emptyDir: {}
            - name: registry-secret
              secret:
                secretName: image-builder-registry-secret
            - name: cosign-secret
              secret:
                secretName: image-builder-cosign-secret
