apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-blog
  namespace: image-builder
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: image-builder-cronjob
          restartPolicy: Never
          initContainers:
            - name: clone-repo
              image: alpine/git:latest
              command:
                - git
                - clone
                - --depth=1
                - https://github.com/MTRNord/cluster.git
                - /workspace
              volumeMounts:
                - name: workspace
                  mountPath: /workspace

          containers:
            - name: build
              image: alpine:3
              securityContext:
                privileged: true
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache podman cosign git >/dev/null

                  # Start podman daemon
                  podman system service unix:///run/podman/podman.sock &>/dev/null &
                  sleep 2

                  mkdir -p /root/.docker
                  cp /registry-secret/dockerconfig.json /root/.docker/config.json

                  TAG_TS="$(date -u +%Y%m%d-%H%M%S)"
                  TAG_SHA="sha-$(git -C /workspace rev-parse --short HEAD)"
                  IMAGE="registry.midnightthoughts.space/mtrnord/blog"

                  echo "==> Building ${IMAGE}:${TAG_TS}"

                  podman build \
                    --platform linux/amd64,linux/arm64 \
                    --manifest "${IMAGE}:${TAG_TS}" \
                    -f /workspace/apps/talos_cluster/blog/docker/Dockerfile \
                    /workspace/apps/talos_cluster/blog/docker

                  podman manifest push --all "${IMAGE}:${TAG_TS}" "docker://${IMAGE}:${TAG_TS}"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:latest"
                  podman tag "${IMAGE}:${TAG_TS}" "${IMAGE}:${TAG_SHA}"
                  podman push "${IMAGE}:latest"
                  podman push "${IMAGE}:${TAG_SHA}"

                  DIGEST="$(podman inspect --format='{{.RepoDigests}}' ${IMAGE}:${TAG_TS} | grep -o 'sha256:[^@]*' | cut -d: -f2)"
                  [ -z "$DIGEST" ] && echo "Failed to get digest" && exit 1
                  echo "==> Digest: sha256:${DIGEST}"

                  COSIGN_PASSWORD="$(cat /cosign-secret/cosign.password)" \
                  cosign sign --yes \
                    --key /cosign-secret/cosign.key \
                    --new-bundle-format=false \
                    --use-signing-config=false \
                    --registry-referrers-mode=oci-1-1 \
                    "${IMAGE}@sha256:${DIGEST}"

                  echo "==> Done: ${IMAGE}:${TAG_TS}"
              env:
                - name: COSIGN_OCI_EXPERIMENTAL
                  value: "1"
                - name: COSIGN_EXPERIMENTAL
                  value: "1"
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                  readOnly: true
                - name: registry-secret
                  mountPath: /registry-secret
                  readOnly: true
                - name: cosign-secret
                  mountPath: /cosign-secret
                  readOnly: true

          volumes:
            - name: workspace
              emptyDir: {}
            - name: registry-secret
              secret:
                secretName: image-builder-registry-secret
            - name: cosign-secret
              secret:
                secretName: image-builder-cosign-secret
