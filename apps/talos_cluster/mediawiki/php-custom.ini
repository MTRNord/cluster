upload_max_filesize = 50M
post_max_size = 50M
memory_limit = 256M
max_execution_time = 60

; OPcache
opcache.enable = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; APCu
apc.enabled = 1
apc.shm_size = 64M
