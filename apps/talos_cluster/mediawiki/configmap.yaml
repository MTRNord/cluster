apiVersion: v1
kind: ConfigMap
metadata:
  name: mediawiki-config
  namespace: mediawiki
data:
  LocalSettings.php: |
    <?php
    # This file is mounted from a ConfigMap.
    # Sensitive values are read from environment variables (set via the mediawiki-cred Secret).

    $wgSitename = "MTRNord's Wiki";
    $wgMetaNamespace = "MTRNord_Wiki";
    $wgServer = "https://wiki.mtrnord.blog";
    $wgScriptPath = "";
    $wgArticlePath = "/wiki/$1";

    # Database
    $wgDBtype     = "mysql";
    $wgDBserver   = "mediawiki-mariadb.mediawiki.svc.cluster.local";
    $wgDBname     = getenv('MW_DB_NAME')     ?: 'mediawiki';
    $wgDBuser     = getenv('MW_DB_USER')     ?: 'mediawiki';
    $wgDBpassword = getenv('MW_DB_PASSWORD') ?: '';

    # Secrets
    $wgSecretKey  = getenv('MW_SECRET_KEY')  ?: '';
    $wgUpgradeKey = getenv('MW_UPGRADE_KEY') ?: '';

    # File uploads
    $wgEnableUploads  = true;
    $wgUploadPath     = "/images";
    $wgUploadDirectory = "/var/www/html/images";
    $wgMaxUploadSize  = 50 * 1024 * 1024; # 50 MB

    # Logo / favicon (update after initial setup)
    $wgLogo = "$wgResourceBasePath/resources/assets/wiki.png";

    # Email (optional — configure SMTP if you want email notifications)
    $wgEnableEmail      = false;
    $wgEnableUserEmail  = false;
    $wgEnotifUserTalk   = false;
    $wgEnotifWatchlist  = false;
    $wgEmailAuthentication = false;

    # Caching
    $wgMainCacheType    = CACHE_NONE;
    $wgSessionCacheType = CACHE_DB;

    # Performance
    $wgParserCacheType  = CACHE_DB;
    $wgJobRunRate        = 1;

    # === Spam prevention ===
    # Disable public account creation — admins create accounts manually
    $wgGroupPermissions['*']['createaccount'] = false;
    $wgGroupPermissions['sysop']['createaccount'] = true;

    # QuestyCaptcha on account creation and repeated bad login
    wfLoadExtensions(['ConfirmEdit', 'ConfirmEdit/QuestyCaptcha']);
    $wgCaptchaClass = 'QuestyCaptcha';
    $wgCaptchaTriggers['createaccount'] = true;
    $wgCaptchaTriggers['badlogin']      = true;
    $wgCaptchaQuestions = [
        "What is the owner's username on this wiki?" => 'MTRNord',
        'What does the "wiki" in MediaWiki stand for?' => 'wiki',
    ];

    wfLoadExtension('SpamBlacklist');
    wfLoadExtension('AbuseFilter');
    wfLoadExtension('CheckUser');

    # === Editing extensions ===
    wfLoadExtension('VisualEditor');
    # VisualEditor needs the internal Parsoid endpoint to avoid SSL loopback in K8s
    $wgVirtualRestConfig['modules']['parsoid'] = [
        'url' => 'http://mediawiki.mediawiki.svc.cluster.local/rest.php',
    ];

    wfLoadExtension('WikiEditor');
    wfLoadExtension('CodeMirror');
    wfLoadExtension('ParserFunctions');
    wfLoadExtension('Cite');
    wfLoadExtension('SyntaxHighlight_GeSHi');
    wfLoadExtension('TemplateStyles');

    # === Skin ===
    wfLoadSkin('Vector');
    $wgDefaultSkin = 'vector-2022';

    # === Misc ===
    $wgRightsPage    = "";
    $wgRightsUrl     = "";
    $wgRightsText    = "";
    $wgRightsIcon    = "";
    $wgDiff3         = "/usr/bin/diff3";
    $wgShellLocale   = "en_US.utf8";

    # Allow read for anonymous users but not edit
    $wgGroupPermissions['*']['read']   = true;
    $wgGroupPermissions['*']['edit']   = false;
    $wgGroupPermissions['user']['edit'] = true;
