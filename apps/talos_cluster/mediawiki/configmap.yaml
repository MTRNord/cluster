apiVersion: v1
kind: ConfigMap
metadata:
  name: mediawiki-config
  namespace: mediawiki
data:
  robots.txt: |
    User-agent: *
    Allow: /wiki/
    Allow: /load.php
    Disallow: /
  LocalSettings.php: |
    <?php
    # This file is mounted from a ConfigMap.
    # Sensitive values are read from environment variables (set via the mediawiki-cred Secret).

    $wgSitename = "MTRNord's Wiki";
    $wgMetaNamespace = "MTRNord_Wiki";
    $wgServer = "https://wiki.mtrnord.blog";
    $wgScriptPath = "";
    $wgArticlePath = "/wiki/$1";

    # Site content language
    $wgLanguageCode = 'en';

    # Database
    $wgDBtype     = "mysql";
    $wgDBserver   = "mediawiki-maxscale.mediawiki.svc.cluster.local";
    $wgDBname     = getenv('MW_DB_NAME')     ?: 'mediawiki';
    $wgDBuser     = getenv('MW_DB_USER')     ?: 'mediawiki';
    $wgDBpassword = getenv('MW_DB_PASSWORD') ?: '';

    # Secrets
    $wgSecretKey  = getenv('MW_SECRET_KEY')  ?: '';
    $wgUpgradeKey = getenv('MW_UPGRADE_KEY') ?: '';

    # File uploads
    $wgEnableUploads  = true;
    $wgUploadPath     = "/images";
    $wgUploadDirectory = "/var/www/html/images";
    $wgMaxUploadSize  = 50 * 1024 * 1024; # 50 MB

    # Logo / favicon (update after initial setup)
    $wgLogo = "$wgResourceBasePath/resources/assets/wiki.png";

    # Email
    $wgEnableEmail         = true;
    $wgEnableUserEmail     = true;
    $wgEnotifUserTalk      = true;
    $wgEnotifWatchlist     = true;
    $wgEmailAuthentication = true;
    $wgEmergencyContact    = 'support@midnightthoughts.space';
    $wgPasswordSender      = 'support@midnightthoughts.space';

    $wgSMTP = [
        'host'     => 'stalwart-mail.stalwart.svc.cluster.local',
        'IDHost'   => 'wiki.mtrnord.blog',
        'port'     => 2587,
        'auth'     => true,
        'username' => 'support@midnightthoughts.space',
        'password' => getenv('MW_SMTP_PASSWORD') ?: '',
        // port 2587 is an internal-only listener with no PROXY protocol requirement;
        // cert is for mail.midnightthoughts.space so peer verification is disabled
        'socket_options' => [
            'ssl' => [
                'verify_peer'      => false,
                'verify_peer_name' => false,
            ],
        ],
    ];

    # Caching — Valkey for shared object/session/parser cache, APCu for localisation
    $wgObjectCaches['redis'] = [
        'class'      => 'RedisBagOStuff',
        'servers'    => ['mediawiki-valkey.mediawiki.svc.cluster.local:6379'],
        'persistent' => true,
    ];
    $wgMainCacheType    = 'redis';
    $wgSessionCacheType = 'redis';
    $wgParserCacheType  = 'redis';

    # Run jobs via CronJob, not on page requests
    # Localisation cache — 'array' stores PHP static arrays in $wgCacheDirectory,
    # picked up by OPcache on subsequent requests (fastest option)
    $wgCacheDirectory = '/tmp/mediawiki-cache';
    $wgLocalisationCacheConf = [
        'class'          => LocalisationCache::class,
        'store'          => 'array',
        'storeClass'     => false,
        'storeDirectory' => false,
        'manualRecache'  => false,
    ];

    $wgJobRunRate = 0;
    $wgUseLocalMessageCache = true;
    $wgEnableSidebarCache = true;

    $wgShowExceptionDetails = true;

    # === Import timeouts for large Wikipedia imports ===
    # Increase PHP execution time for imports
    set_time_limit(900); # 15 minutes
    ini_set('max_execution_time', 900);

    # Increase socket timeout for fetching remote content
    ini_set('default_socket_timeout', 300);

    # Allow imports from Wikipedia and other major sources
    $wgImportSources = [
        'wikipedia'    => 'https://en.wikipedia.org',
        'wikipedia_de' => 'https://de.wikipedia.org',
    ];

    # Allow local file imports for bulk operations
    $wgImportSources[] = 'interwiki';
    $wgImportAllowAll = true;

    # === IP Forwarding from Envoy Gateway ===
    # Trust X-Forwarded-For from Envoy Gateway (pod CIDR and private network)
    $wgUsePrivateIPs = true;
    $wgTrustedProxies = ['10.0.128.0/17', '10.0.96.0/19', 'fd00:10:244::/56', 'fd00:10:96::/112'];

    # Tell MediaWiki to read client IP from X-Forwarded-For header
    # (Envoy Gateway adds this header with the real client IP)
    $wgUseXForwardedFor = true;

    # Also read protocol from header (HTTP vs HTTPS)
    $wgHttp['withHttps'] = true;

    # === Spam prevention ===
    # Disable public account creation — admins create accounts manually
    $wgGroupPermissions['*']['createaccount'] = false;
    $wgGroupPermissions['sysop']['createaccount'] = true;

    # QuestyCaptcha on account creation and repeated bad login
    wfLoadExtensions(['ConfirmEdit', 'ConfirmEdit/QuestyCaptcha']);
    $wgCaptchaClass = 'QuestyCaptcha';
    $wgCaptchaTriggers['createaccount'] = true;
    $wgCaptchaTriggers['badlogin']      = true;
    $wgCaptchaQuestions = [
        "What is the owner's username on this wiki?" => 'MTRNord',
        'What does the "wiki" in MediaWiki stand for?' => 'wiki',
    ];

    wfLoadExtension('SpamBlacklist');
    wfLoadExtension('AbuseFilter');
    wfLoadExtension('CheckUser');

    # === Editing extensions ===
    wfLoadExtension('TemplateData');
    wfLoadExtension('VisualEditor');
    # VisualEditor needs the internal Parsoid endpoint to avoid SSL loopback in K8s
    $wgVirtualRestConfig['modules']['parsoid'] = [
        'url' => 'http://mediawiki.mediawiki.svc.cluster.local/rest.php',
    ];

    wfLoadExtension('WikiEditor');
    wfLoadExtension('CodeMirror');
    wfLoadExtension('ParserFunctions');
    wfLoadExtension('Cite');
    wfLoadExtension('CiteThisPage');
    wfLoadExtension('SyntaxHighlight_GeSHi');
    wfLoadExtension('TemplateStyles');

    # === User / account extensions ===
    wfLoadExtension('Babel');
    wfLoadExtension('BetaFeatures');
    wfLoadExtension('Echo');
    wfLoadExtension('GPGMail');
    wfLoadExtension('GuidedTour');
    wfLoadExtension('LoginNotify');

    # === Language / Translation ===

    wfLoadExtension('CLDR');

    $wgDefaultUserOptions['usenewrc'] = 1;

    $wgUseInstantCommons = true;

    # === Parser & Template Extensions ===
    wfLoadExtension('ParserFunctions');
    wfLoadExtension('Scribunto');
    $wgScribuntoDefaultEngine = 'luastandalone';
    $wgScribuntoEngineConf['luastandalone'] = [
        'memoryLimit' => 52428800,  // 50 MB (default is 52MB)
        'cpuLimit' => 30,            // 30 seconds (increased from default 10s)
    ];
    wfLoadExtension('JsonConfig');
    $wgJsonConfigEnableLuaSupport = true;
    $wgJsonConfigModels['Tabular.JsonConfig'] = 'JsonConfig\JCTabularContent';
    $wgJsonConfigs['Tabular.JsonConfig'] = [
            'namespace' => 486,
            'nsName' => 'Data',
            // page name must end in .tab, and contain at least one symbol
            'pattern' => '/.\.tab$/',
            'license' => 'CC0-1.0',
            'isLocal' => false,
    ];

    $wgJsonConfigModels['Map.JsonConfig'] = 'JsonConfig\JCMapDataContent';
    $wgJsonConfigs['Map.JsonConfig'] = [
            'namespace' => 486,
            'nsName' => 'Data',
            // page name must end in .map, and contain at least one symbol
            'pattern' => '/.\.map$/',
            'license' => 'CC0-1.0',
            'isLocal' => false,
    ];
    $wgJsonConfigInterwikiPrefix = "commons";

    $wgJsonConfigs['Tabular.JsonConfig']['remote'] = [
            'url' => 'https://commons.wikimedia.org/w/api.php'
    ];
    $wgJsonConfigs['Map.JsonConfig']['remote'] = [
            'url' => 'https://commons.wikimedia.org/w/api.php'
    ];

    # Load Translate extension for structured translation workflows
    wfLoadExtension('Translate');
    $wgGroupPermissions['user']['translate'] = true;
    $wgGroupPermissions['user']['translate-messagereview'] = true;
    $wgGroupPermissions['user']['translate-groupreview'] = true;
    $wgGroupPermissions['user']['translate-import'] = true;
    $wgGroupPermissions['sysop']['pagetranslation'] = true;
    $wgGroupPermissions['sysop']['translate-manage'] = true;
    $wgEnablePageTranslation = true;
    $wgTranslateDocumentationLanguageCode = 'qqq';
    $wgExtraLanguageNames['qqq'] = 'Message documentation'; # No linguistic content. Used for documenting messages

    # Load UniversalLanguageSelector for language selection UI
    wfLoadExtension('UniversalLanguageSelector');
    $wgULSEnable = true;
    $wgULSPosition = 'personal';
    $wgULSGeoService = false;  // Disable GeoIP-based language suggestions
    $wgULSAnonCanChangeLanguage = true;  // Allow anonymous users to change UI language

    # === Content / navigation extensions ===
    wfLoadExtension('ArticleCreationWorkflow');
    wfLoadExtension('Disambiguator');
    wfLoadExtension('CreditsSource');
    wfLoadExtension('NearbyPages');
    wfLoadExtension('RSS');
    wfLoadExtension('MultimediaViewer');
    wfLoadExtension('RevisionSlider');
    wfLoadExtension('ReadingLists');

    # RelatedArticles — use TextExtracts for descriptions; no CirrusSearch on this wiki
    wfLoadExtension('RelatedArticles');
    $wgRelatedArticlesUseCirrusSearch = false;
    $wgRelatedArticlesDescriptionSource = 'textextracts';
    $wgRelatedArticlesFooterAllowedSkins = ['vector', 'vector-2022'];
    wfLoadExtension('TextExtracts');
    wfLoadExtension('Thanks');
    wfLoadExtension('TorBlock');
    wfLoadExtension('SecureLinkFixer');

    # === ContactPage ===
    wfLoadExtension('ContactPage');
    $wgContactConfig['default'] = [
        'RecipientUser'  => 'MTRNord',
        'SenderName'     => 'Wiki Contact Form',
        'SenderEmail'    => 'support@midnightthoughts.space',
        'RequireDetails' => true,
        'IncludeIP'      => false,
    ];

    # === PdfHandler ===
    wfLoadExtension('PdfHandler');
    $wgFileExtensions[] = 'pdf';

    # === Skins ===
    wfLoadSkin('Vector');
    wfLoadSkin('MinervaNeue');
    $wgDefaultSkin = 'vector-2022';
    wfLoadExtension('MobileFrontend');
    $wgMFDefaultSkinClass = 'SkinMinerva';

    # === Misc ===
    $wgRightsPage    = "";
    $wgRightsUrl     = "";
    $wgRightsText    = "";
    $wgRightsIcon    = "";
    $wgDiff3         = "/usr/bin/diff3";
    $wgShellLocale   = "en_US.utf8";

    # Allow read for anonymous users but not edit
    $wgGroupPermissions['*']['read']   = true;
    $wgGroupPermissions['*']['edit']   = false;
    $wgGroupPermissions['user']['edit'] = true;

    wfLoadExtension('TitleBlacklist');

    # === Extensions pending MW 1.46 upgrade ===
    # Uncomment each block and add the clone to the Dockerfile when upgrading.
    #
    # EasyTimeline — timeline diagrams via Ploticus
    #   Dockerfile: git clone --branch REL1_46 https://gerrit.wikimedia.org/r/mediawiki/extensions/timeline extensions/EasyTimeline
    #   System packages: ploticus perl poppler-utils
    #   wfLoadExtension('EasyTimeline');
    #
    # EmailAuth — require email verification token on each login
    #   Dockerfile: git clone --branch REL1_46 https://gerrit.wikimedia.org/r/mediawiki/extensions/EmailAuth extensions/EmailAuth
    #   wfLoadExtension('EmailAuth');
    #
    # PropertySuggester — Wikibase property suggestions (only useful if Wikibase is deployed)
    #   Dockerfile: git clone --branch REL1_46 https://gerrit.wikimedia.org/r/mediawiki/extensions/PropertySuggester extensions/PropertySuggester
    #   wfLoadExtension('PropertySuggester');
    #
    # RealMe — links user pages to verified real-world identity
    #   Dockerfile: git clone --branch REL1_46 https://gerrit.wikimedia.org/r/mediawiki/extensions/RealMe extensions/RealMe
    #   wfLoadExtension('RealMe');
    #
    # TocTree — floating/expandable table of contents (replaces built-in TOC)
    #   Dockerfile: git clone --branch REL1_46 https://gerrit.wikimedia.org/r/mediawiki/extensions/TocTree extensions/TocTree
    #   wfLoadExtension('TocTree');
