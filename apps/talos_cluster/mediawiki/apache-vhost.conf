<VirtualHost *:80>
    ServerName wiki.mtrnord.blog
    DocumentRoot /var/www/html

    AllowEncodedSlashes NoDecode

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Pass X-Forwarded-For and X-Forwarded-Proto headers from Envoy to PHP
    SetEnvIf X-Forwarded-For "^.*\..*\..*\..*" forwarded
    RequestHeader set X-Forwarded-For "%{X-Forwarded-For}e" env=forwarded
    RequestHeader set X-Forwarded-Proto "%{X-Forwarded-Proto}e" env=X-Forwarded-Proto

    RewriteEngine On
    RewriteRule ^/?wiki(/.*)?$ %{DOCUMENT_ROOT}/index.php [L]
    RewriteRule ^/?$ %{DOCUMENT_ROOT}/index.php [L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
