apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: matrix
resources:
  - connectivity_tester.yaml
  - staging_deployment.yaml
  - deployment.yaml
  - service.yaml
  - image-policies.yaml
  - valkey-staging.yaml
  - valkey-production.yaml
configMapGenerator:
  - name: connectivity-tester-config
    namespace: matrix
    files:
      - config.json=config.json
  - name: connectivity-tester-stage-config
    namespace: matrix
    files:
      - config.json=staging_config.json
