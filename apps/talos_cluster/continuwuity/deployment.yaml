apiVersion: apps/v1
kind: Deployment
metadata:
  name: continuwuity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: continuwuity
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: continuwuity
      annotations:
        # Explicit Kopia backup for this hcloud-volume (no CSI snapshots available)
        backup.velero.io/backup-volumes: continuwuity-data
        # Freeze the process during Velero backup to ensure consistent RocksDB snapshot
        pre.hook.backup.velero.io/command: '["/bin/sh", "-c", "kill -STOP 1"]'
        pre.hook.backup.velero.io/timeout: "30s"
        post.hook.backup.velero.io/command: '["/bin/sh", "-c", "kill -CONT 1"]'
        post.hook.backup.velero.io/timeout: "30s"
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: continuwuity
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: "2000m"
              memory: "3Gi"
            requests:
              memory: "1Gi"
              cpu: "500m"
          image: registry.midnightthoughts.space/mtrnord/cluster/continuwuity:20260412-073242 # {"$imagepolicy": "flux-system:continuwuity"}
          #image: forgejo.ellis.link/continuwuation/continuwuity:pr-1099-head
          imagePullPolicy: Always
          ports:
            - containerPort: 8448
          # Mount the continuwuity config which is stored in the continuwuity-config secret at the config path and should go to /config.yaml
          volumeMounts:
            - name: continuwuity-config
              mountPath: /etc/conduwuit
              readOnly: true
            - name: continuwuity-data
              mountPath: /var/lib/continuwuity
            - name: tmp
              mountPath: /tmp
          env:
            - name: CONTINUWUITY_CONFIG
              value: /etc/conduwuit/conduwuit.toml
          startupProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8448
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8448
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8448
            timeoutSeconds: 5
      # Mount the continuwuity config which is stored in the continuwuity-config secret at the config path and should go to /config.yaml
      volumes:
        - name: continuwuity-config
          secret:
            secretName: continuwuity-config
        - name: continuwuity-data
          persistentVolumeClaim:
            claimName: continuwuity-3
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: continuwuity
spec:
  selector:
    app: continuwuity
  ports:
    - name: http
      protocol: TCP
      port: 8448
      targetPort: 8448
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: continuwuity
  namespace: continuwuity
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
  hostnames:
    - matrix.mtrnord.blog
  rules:
    - name: client-traffic
      matches:
        - path:
            type: PathPrefix
            value: /_matrix/client
      backendRefs:
        - name: continuwuity
          port: 8448
      timeouts:
        request: 240s
        backendRequest: 0s
    - name: media-traffic
      matches:
        - path:
            type: PathPrefix
            value: /_matrix/media
      backendRefs:
        - name: continuwuity
          port: 8448
    - name: federation-traffic
      matches:
        - path:
            type: PathPrefix
            value: /_matrix/federation
      backendRefs:
        - name: continuwuity
          port: 8448
      timeouts:
        request: 240s
        backendRequest: 0s
    - name: fallback
      backendRefs:
        - name: continuwuity
          port: 8448
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: continuwuity-general-ratelimit
  namespace: continuwuity
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: continuwuity
  circuitBreaker:
    maxConnections: 1500
    maxPendingRequests: 300
    maxParallelRequests: 700
    maxParallelRetries: 50
