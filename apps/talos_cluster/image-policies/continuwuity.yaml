apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: continuwuity
  namespace: flux-system
spec:
  image: registry.midnightthoughts.space/mtrnord/cluster/continuwuity
  interval: 1h
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: continuwuity
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: continuwuity
  filterTags:
    pattern: '^\d{8}-\d{6}$'
  policy:
    alphabetical:
      order: asc
